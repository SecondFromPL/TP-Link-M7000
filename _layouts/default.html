<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
{% seo %}
<link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/assets/favicon.ico">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  .console-block { position: relative; background-color: #1e1e1e; color: #d4d4d4; padding: 2.5rem 1rem 1rem 1rem; border-radius: 0.5rem; font-family: var(--bs-font-monospace); margin-bottom: 1.5rem; }
  .console-block::before { content: "root@M7000:~#"; position: absolute; top: 0.6rem; left: 1rem; color: #4af626; font-size: 0.85rem; font-weight: bold; }
  .console-block .copy-btn { position: absolute; top: 0.4rem; right: 0.4rem; font-size: 0.75rem; }
  .console-block pre { margin: 0; color: inherit; }
  #backToTopBtn { display: none; position: fixed; bottom: 20px; right: 30px; z-index: 99; }
</style>
</head>
<body>
<div class="container mt-5 mb-5">
  {% if page.show_warning %}
  <div class="alert alert-danger" role="alert">
    <strong>UWAGA:</strong> Wszelkie modyfikacje oprogramowania układowego wykonujesz na własne ryzyko. Zastosowanie poniższych kroków może wiązać się z utratą gwarancji lub trwałym uszkodzeniem urządzenia (tzw. brick).
  </div>
  {% endif %}
  {{ content }}
</div>
<button id="backToTopBtn" class="btn btn-dark" title="Powrót na górę">&uarr;</button>
<script src="{{ site.baseurl }}/assets/js/main.js"></script>
</body>
</html>
